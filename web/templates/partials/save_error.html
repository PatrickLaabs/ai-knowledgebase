{{define "save_error"}}
<!--
  Replaces #save-status-target when a job fails.
  No hx-trigger — polling stops because this element has no poll trigger.
-->
<div id="save-status-target"
     class="flex items-center gap-2 text-xs text-red-400">
  <span>⚠</span>
  {{.Error}}
  <button type="button"
          onclick="document.getElementById('save-status-target').remove()"
          class="ml-1 text-red-500 hover:text-red-300">✕</button>
</div>
{{end}}
